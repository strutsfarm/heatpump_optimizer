run_optimization:
  name: Run Optimization
  description: >-
    Manually trigger the heat pump cost optimization. This will fetch
    the latest electricity prices and weather forecast, then compute
    the optimal heat pump schedule for the next 24 hours using predictive
    MPC with solar/wind/rain anticipation and DHW coordination.

set_mode:
  name: Set Optimizer Mode
  description: >-
    Set the operating mode of the heat pump optimizer.
  fields:
    mode:
      name: Mode
      description: >-
        The operating mode to set. Available modes:
        - auto: Full MPC optimization with predictive weather anticipation (recommended)
        - comfort: Maintain comfort temperature, ignore price optimization
        - economy: Aggressive cost savings, wider temperature swings allowed
        - boost: Maximum heating power
        - off: Disable optimizer, heat pump left in default state
      required: true
      example: "auto"
      selector:
        select:
          options:
            - auto
            - comfort
            - economy
            - boost
            - "off"

set_thermal_parameters:
  name: Set Thermal Parameters
  description: >-
    Update the thermal model parameters used by the optimizer.
    Useful for fine-tuning the model to match your house's actual
    thermal behavior. Supports single-zone, two-zone, DHW, and
    weather sensitivity parameters.
  fields:
    house_thermal_mass:
      name: House Thermal Mass
      description: >-
        Thermal mass of the house (air + furnishings) in kWh/°C.
        Higher values mean slower temperature changes.
      required: false
      example: 10.0
      selector:
        number:
          min: 2
          max: 50
          step: 0.5
          unit_of_measurement: "kWh/°C"
    house_heat_loss_coefficient:
      name: Heat Loss Coefficient
      description: >-
        Overall heat loss coefficient in kW/°C. Lower values
        indicate better insulation.
      required: false
      example: 0.15
      selector:
        number:
          min: 0.05
          max: 1.0
          step: 0.01
          unit_of_measurement: "kW/°C"
    slab_thermal_mass:
      name: Slab Thermal Mass
      description: >-
        Thermal mass of the concrete slab floor in kWh/°C.
      required: false
      example: 5.0
      selector:
        number:
          min: 1
          max: 30
          step: 0.5
          unit_of_measurement: "kWh/°C"
    slab_heat_transfer:
      name: Slab Heat Transfer Coefficient
      description: >-
        Heat transfer coefficient between slab and room in kW/°C.
      required: false
      example: 0.8
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
          unit_of_measurement: "kW/°C"
    heat_pump_cop_nominal:
      name: Heat Pump Nominal COP
      description: >-
        Nominal COP of the heat pump at 7°C outdoor temperature.
      required: false
      example: 3.5
      selector:
        number:
          min: 1.5
          max: 6.0
          step: 0.1
    upper_floor_thermal_mass:
      name: Upper Floor Thermal Mass
      description: >-
        Thermal mass of the upper floor (radiator zone) in kWh/°C.
      required: false
      example: 3.0
      selector:
        number:
          min: 1
          max: 20
          step: 0.5
          unit_of_measurement: "kWh/°C"
    lower_floor_thermal_mass:
      name: Lower Floor Thermal Mass
      description: >-
        Thermal mass of the lower floor (slab zone) in kWh/°C.
      required: false
      example: 8.0
      selector:
        number:
          min: 1
          max: 30
          step: 0.5
          unit_of_measurement: "kWh/°C"
    inter_zone_heat_transfer:
      name: Inter-Zone Heat Transfer
      description: >-
        Heat transfer coefficient between upper and lower floors in kW/°C.
        Higher values for open floor plans.
      required: false
      example: 0.5
      selector:
        number:
          min: 0.0
          max: 3.0
          step: 0.1
          unit_of_measurement: "kW/°C"
    radiator_power_fraction:
      name: Radiator Power Fraction
      description: >-
        Fraction of heat pump output going to radiators (upper floor).
        0.0 = all floor heating, 1.0 = all radiators.
      required: false
      example: 0.4
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
    window_area:
      name: Window Area
      description: >-
        Total glazing area for solar heat gain calculation in m².
      required: false
      example: 10.0
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
          unit_of_measurement: "m²"
    solar_heat_gain_coefficient:
      name: Solar Heat Gain Coefficient (SHGC)
      description: >-
        Fraction of solar energy transmitted through windows.
        Typical values: 0.3 (triple low-e) to 0.8 (single clear).
      required: false
      example: 0.7
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.05
    dhw_tank_volume:
      name: DHW Tank Volume
      description: >-
        Volume of the domestic hot water storage tank in liters.
      required: false
      example: 200
      selector:
        number:
          min: 50
          max: 500
          step: 10
          unit_of_measurement: "L"
    dhw_setpoint:
      name: DHW Setpoint Temperature
      description: >-
        Target temperature for the domestic hot water tank in °C.
      required: false
      example: 55
      selector:
        number:
          min: 40
          max: 65
          step: 1
          unit_of_measurement: "°C"
    dhw_min_temperature:
      name: DHW Minimum Temperature
      description: >-
        Minimum acceptable DHW tank temperature in °C.
        Below this, DHW heating is prioritized.
      required: false
      example: 45
      selector:
        number:
          min: 35
          max: 55
          step: 1
          unit_of_measurement: "°C"
    dhw_daily_consumption:
      name: DHW Daily Consumption
      description: >-
        Estimated daily hot water consumption in liters/day.
      required: false
      example: 150
      selector:
        number:
          min: 50
          max: 500
          step: 10
          unit_of_measurement: "L/day"
    wind_sensitivity_factor:
      name: Wind Sensitivity Factor
      description: >-
        How much wind increases heat loss. 0.15 means 15% more heat
        loss per m/s of wind speed. Adjusts convective heat transfer.
      required: false
      example: 0.15
      selector:
        number:
          min: 0.0
          max: 0.5
          step: 0.01
    rain_heat_loss_multiplier:
      name: Rain Heat Loss Multiplier
      description: >-
        Heat loss multiplier when raining. 1.15 means 15% more heat
        loss during rain (wet building envelope effect).
      required: false
      example: 1.15
      selector:
        number:
          min: 1.0
          max: 1.5
          step: 0.01
